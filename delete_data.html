<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Transaction | Smart Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        :root { --bg: #f0f4f8; --primary: #0288d1; --text-main: #333333; --text-sub: #666666; --danger: #d32f2f; }
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; }
        .content { width: 100%; height: 100%; display: flex; flex-direction: column; }
        header { background-color: var(--primary); color: white; padding: 15px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .main-scroll { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .container { max-width: 600px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .form-group { margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px;}
        .form-group label { font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; }
        .transaction-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .transaction-item { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .item-details { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-weight: 600; font-size: 15px; }
        .item-time { font-size: 12px; color: var(--text-sub); }
        .item-right { text-align: right; display: flex; flex-direction: column; gap: 6px; }
        .item-amount { font-weight: 700; font-size: 15px; color: #2e7d32; }
        .delete-btn { background-color: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .delete-btn:hover { background-color: #b21010; }
        .no-data { text-align: center; color: var(--text-sub); font-size: 14px; padding: 15px 0; }
       
        /* Bottom Tab Navigation Bar */
        .bottom {
            height: 70px; position: fixed; bottom: 0; left: 0; right: 0; 
            display: flex; justify-content: space-around; align-items: center; 
            background: white; border-top: 1px solid var(--border); z-index: 100;
        }
        .bottom button { background: none; border: none; font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; color: var(--text-sub); cursor: pointer; width: 25%; }
        .bottom button.active { color: var(--primary); }
        .bottom .icon { font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="content">
    <header><h1>Delete Transaction</h1></header>
    <div class="main-scroll">
        <div class="container">
            <div class="panel">
                <div class="form-group">
                    <label for="selectDate">Select Date</label>
                    <input type="date" id="selectDate" required>
                </div>
            </div>

            <div class="panel">
                <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--primary);">Transactions List</h3>
                <div class="transaction-list" id="transactionList">
                    <div class="no-data">Loading transactions...</div>
                </div>
            </div>
        </div>
    </div>
      <!-- Bottom Tab Navigation -->
    <div class="bottom">
        <button id="navHome" class="active"><span class="icon">🏠</span>Home</button>
        <button onclick="location.href='entry.html'"><span class="icon">➕</span>Entry</button>
        <button onclick="location.href='delete_data.html'"><span class="icon">🗑️</span>Delete</button>
    </div>
</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, get, remove, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const dateInput = document.getElementById('selectDate');
    const today = new Date();
    const offset = today.getTimezoneOffset();
    const localDate = new Date(today.getTime() - (offset * 60 * 1000));
    dateInput.value = localDate.toISOString().split('T')[0];

    const firebaseConfig = { databaseURL: "https://all-projects-2a14a-default-rtdb.firebaseio.com", projectId: "all-projects-2a14a" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let activeAdminName = localStorage.getItem("aquaUser") || "Guest";

    function loadTransactions() {
        const dateInputVal = dateInput.value; 
        if (!dateInputVal) return;

        const dateParts = dateInputVal.split('-');
        const targetDateStr = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`; // DD/MM/YYYY

        const dbRef = ref(db, `users/${activeAdminName}/transactions`);
        
        onValue(dbRef, (snapshot) => {
            const listContainer = document.getElementById('transactionList');
            listContainer.innerHTML = '';
            let hasData = false;

            if (snapshot.exists()) {
                const data = snapshot.val();
                
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    if (item.date && item.date.startsWith(targetDateStr)) {
                        hasData = true;
                        const timePart = item.date.split(', ')[1] || '';

                        const itemHtml = `
                            <div class="transaction-item">
                                <div class="item-details">
                                    <span class="item-name">${item.customer || 'N/A'}</span>
                                    <span class="item-amount">₹${item.amt || 0}</span>
                                    <span class="item-time">${timePart}</span>
                                </div>
                                <div class="item-right">
                                    <button class="delete-btn" onclick="deleteTransaction('${key}')">Delete</button>
                                </div>
                            </div>
                        `;
                        listContainer.insertAdjacentHTML('beforeend', itemHtml);
                    }
                });
            }

            if (!hasData) {
                listContainer.innerHTML = '<div class="no-data">No transactions found for this date.</div>';
            }
        });
    }

    // குளோபல் ஸ்கோப்பில் டெலீட் ஃபங்க்ஷன் செயல்பட விண்டோவுடன் இணைக்கப்படுகிறது
    window.deleteTransaction = async (key) => {
        const confirmation = prompt("பாதுகாப்புக்காக 'a b c d' என்று கீழே டைப் செய்து உறுதிப்படுத்தவும்:");
        
        if (confirmation === "a b c d" || confirmation === "abcd") {
            try {
                await remove(ref(db, `users/${activeAdminName}/transactions/${key}`));
                alert("எண்ட்ரி வெற்றிகரமாக டெலீட் செய்யப்பட்டது!");
            } catch (error) {
                alert("டெலீட் செய்வதில் பிழை ஏற்பட்டது!");
            }
        } else {
            alert("உறுதிப்படுத்தல் தவறானது! டெலீட் செயல்பாடு ரத்து செய்யப்பட்டது.");
        }
    };

    dateInput.addEventListener('change', loadTransactions);
    loadTransactions();
</script>

</body>
</html>
