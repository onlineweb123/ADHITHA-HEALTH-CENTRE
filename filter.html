<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Tracker | Hospital Billing</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        :root { --bg: #f0f4f8; --primary: #0288d1; --text-main: #333333; --text-sub: #666666; --border: #e2e8f0; }
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; }
        .content { width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        header { background-color: var(--primary); color: white; padding: 15px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        header h1 { font-size: 20px; font-weight: 700; }
        
        .main-scroll { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* காலண்டர் ஃபில்டர் பகுதி */
        .filter-panel { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .filter-panel label { font-weight: 700; font-size: 14px; color: var(--primary); }
        .date-picker-wrapper { width: 100%; }
        .date-picker-wrapper input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; font-weight: 600; color: var(--text-main); }

        /* இரண்டு பட்டன்கள் (Tabs) பகுதி */
        .tab-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: white; border: 2px solid #e9ecef; text-align: center; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 700; color: var(--text-sub); transition: all 0.2s ease; }
        .tab-btn.active { background: #e1f5fe; border-color: var(--primary); color: var(--primary); }
        
        /* லிสต์ காட்டும் பகுதி */
        .history-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .history-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f4f8; padding-bottom: 8px; }
        .transaction-list { display: flex; flex-direction: column; gap: 10px; }
        .transaction-item { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .item-details { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-weight: 600; font-size: 15px; }
        .item-reason { font-size: 13px; color: var(--primary); font-weight: 500; } /* புது ஸ்டைல் */
        .item-time { font-size: 12px; color: var(--text-sub); }
        .item-right { text-align: right; display: flex; flex-direction: column; gap: 4px; }
        .item-amount { font-weight: 700; font-size: 15px; color: #2e7d32; }
        .item-type { font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .type-cash { background: #e8f5e9; color: #2e7d32; }
        .type-gpay { background: #e1f5fe; color: #0288d1; }
        .no-data { text-align: center; color: var(--text-sub); font-size: 14px; padding: 25px 0; font-weight: 500; }
    
        /* Bottom Tab Navigation Bar */
        .bottom {
            height: 70px; position: fixed; bottom: 0; left: 0; right: 0; 
            display: flex; justify-content: space-around; align-items: center; 
            background: white; border-top: 1px solid var(--border); z-index: 100;
        }
        
        .bottom button { background: none; border: none; font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; color: var(--text-sub); cursor: pointer; width: 25%; }
        .bottom button.active { color: var(--primary); }
        .bottom .icon { font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="content">
    <header><h1>Payment Reports</h1></header>
    
    <div class="main-scroll">
        <div class="container">
            
            <!-- காலண்டர் ஃபில்டர் பகுதி -->
            <div class="filter-panel">
                <label for="filterDate">Select Date</label>
                <div class="date-picker-wrapper">
                    <input type="date" id="filterDate">
                </div>
            </div>

            <!-- இடது - கேஷ் பட்டன், வலது - ஜிபே பட்டன் -->
            <div class="tab-group">
                <button class="tab-btn active" id="btnCash" data-type="Cash">💵 Cash Payments</button>
                <button class="tab-btn" id="btnGPay" data-type="GPay">📱 GPay Payments</button>
            </div>

            <!-- தேர்ந்தெடுத்த முறைப்படி லிสต์ காட்டும் பகுதி -->
            <div class="history-panel">
                <div class="history-title">
                    <span id="listTitle">Cash Transactions</span>
                    <span id="totalFilteredAmount" style="color: #2e7d32;">Total: ₹0</span>
                </div>
                <div class="transaction-list" id="filteredTransactions">
                    <div class="no-data">Loading transactions...</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bottom Tab Navigation -->
    <div class="bottom">
        <button id="navHome" onclick="location.href='index.html'"><span class="icon">🏠</span>Home</button>
        <button onclick="location.href='filter.html'" class="active"><span class="icon">📙</span>Filter</button>
        <button onclick="location.href='entry.html'"><span class="icon">➕</span>Entry</button>
        <button onclick="location.href='delete_data.html'"><span class="icon">🗑️</span>Delete</button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    // காலண்டர் அமைப்புகள் (Default ஆக இன்றைய தேதி)
    const filterDateInput = document.getElementById('filterDate');
    const today = new Date();
    const offset = today.getTimezoneOffset();
    const localDate = new Date(today.getTime() - (offset * 60 * 1000));
    filterDateInput.value = localDate.toISOString().split('T')[0];

    // Firebase Config (உங்களுடைய டேட்டாபேஸ் விவரங்கள்)
    const firebaseConfig = { databaseURL: "https://all-projects-2a14a-default-rtdb.firebaseio.com", projectId: "all-projects-2a14a" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let activeAdminName = localStorage.getItem("aquaUser") || "Guest";

    let currentSelectedType = "Cash"; // ஆரம்பத்தில் Cash மட்டும் காட்டும்

    // டேட்டாவை ஃபில்டர் செய்து காட்டும் முக்கிய ஃபங்க்ஷன்
    function loadFilteredTransactions() {
        const dateInputVal = filterDateInput.value; 
        if (!dateInputVal) return;

        // தேதி வடிவத்தை DD/MM/YYYY ஆக மாற்றுவது
        const dateParts = dateInputVal.split('-');
        const targetDateStr = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`; 

        const dbRef = ref(db, `users/${activeAdminName}/transactions`);
        
        onValue(dbRef, (snapshot) => {
            const listContainer = document.getElementById('filteredTransactions');
            const totalText = document.getElementById('totalFilteredAmount');
            listContainer.innerHTML = '';
            
            let totalAmount = 0;
            let hasData = false;

            if (snapshot.exists()) {
                const data = snapshot.val();
                const sortedKeys = Object.keys(data).reverse(); // புதிய டேட்டா மேலே வர

                sortedKeys.forEach(key => {
                    const item = data[key];
                    
                    // ஒரே தேதியாகவும், நாம் தேர்ந்தெடுத்த பேமெண்ட் முறையாகவும் (Cash / GPay) இருந்தால் மட்டுமே காட்டும்
                    if (item.date && item.date.startsWith(targetDateStr) && item.type === currentSelectedType) {
                        hasData = true;
                        totalAmount += parseFloat(item.amt || 0);

                        const timePart = item.date.split(', ')[1] || '';
                        
                        // புது வரவு: எதற்காக பில் போடப்பட்டது என்கிற விவரத்தை எடுக்கிறது
                        const itemReason = item.reason ? item.reason : '';

                        // இமோஜிகளை அழகாகக் காட்ட
                        let reasonBadge = '';
                        if (itemReason === "Doctor Fees") reasonBadge = "🩺 Doctor Fees";
                        else if (itemReason === "Pharmacy") reasonBadge = "💊 Pharmacy";
                        else if (itemReason === "ECG") reasonBadge = "📊 ECG";
                        else if (itemReason === "Echo") reasonBadge = "❤️ Echo";
                        else reasonBadge = itemReason;

                        const itemHtml = `
                            <div class="transaction-item">
                                <div class="item-details">
                                    <span class="item-name">${item.customer}</span>
                                    ${itemReason ? `<span class="item-reason">${reasonBadge}</span>` : ''}
                                    <span class="item-time">${timePart}</span>
                                </div>
                                <div class="item-right">
                                    <span class="item-amount">₹${item.amt}</span>
                                    <span class="item-type ${item.type === 'Cash' ? 'type-cash' : 'type-gpay'}">
                                        ${item.type === 'Cash' ? '💵 Cash' : '📱 GPay'}
                                    </span>
                                </div>
                            </div>
                        `;
                        listContainer.insertAdjacentHTML('beforeend', itemHtml);
                    }
                });
            }

            totalText.innerText = `Total: ₹${totalAmount}`;
            if (!hasData) {
                listContainer.innerHTML = `<div class="no-data">No ${currentSelectedType} transactions found for this date.</div>`;
            }
        });
    }

    // பட்டன்களை மாற்றி கிளிக் செய்யும்போது நடக்கும் மாற்றங்கள்
    document.querySelectorAll('.tab-btn').forEach(button => {
        button.addEventListener('click', (e) => {
            // முந்தைய Active பட்டனை மாற்றுவது
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // கிளிக் செய்த பட்டனை Active ஆக்குவது
            e.target.classList.add('active');
            
            // டைப் மாற்றி டைட்டிலை மாற்றுவது
            currentSelectedType = e.target.getAttribute('data-type');
            document.getElementById('listTitle').innerText = `${currentSelectedType} Transactions`;
            
            // டேட்டாவை மறுபடி லோடு செய்வது
            loadFilteredTransactions();
        });
    });

    // காலண்டர் தேதியை மாற்றும்போது டேட்டாவை மாற்றுவது
    filterDateInput.addEventListener('change', loadFilteredTransactions);
    
    // ஆரம்பத்தில் பக்கத்தை திறக்கும்போது லோடு செய்ய
    loadFilteredTransactions();
</script>

</body>
</html>
